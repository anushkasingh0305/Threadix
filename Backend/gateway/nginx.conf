# ─── Upstream service definitions ───────────────────────────────────────────
upstream auth_service {
    server auth-service:8000;
}

upstream thread_service {
    server thread-service:8001;
}

upstream notification_service {
    server notification-service:8002;
}

# ─── Main server block ───────────────────────────────────────────────────────
server {
    listen 80;
    server_name localhost;

    # ── Global proxy headers ──────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Auth Service routes ───────────────────────────────────────────────────
    location /api/auth/ {
        proxy_pass http://auth_service/;
    }

    # ── Thread Service HTTP routes ────────────────────────────────────────────
    location /api/threads/ {
        proxy_pass http://thread_service/threads/;
    }

    location /api/search/ {
        proxy_pass http://thread_service/search/;
    }

    location /api/tags/ {
        proxy_pass http://thread_service/tags/;
    }

    # ── Notification Service HTTP routes ──────────────────────────────────────
    location /api/notifications/ {
        proxy_pass http://notification_service/notifications/;
    }

    # ── Notification Service WebSocket ────────────────────────────────────────
    location /ws/notifications {
        proxy_pass http://notification_service/ws/notifications;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Thread Service WebSocket ──────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://thread_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        return 200 'gateway ok';
        add_header Content-Type text/plain;
    }

    # ── Error handling ────────────────────────────────────────────────────────
    error_page 502 503 504 /50x.json;
    location = /50x.json {
        return 503 '{"detail": "Service temporarily unavailable"}';
        add_header Content-Type application/json;
    }
}
