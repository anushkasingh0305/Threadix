# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = %(here)s/alembic

prepend_sys_path = .

path_separator = os

# database URL — overridden by env.py using settings
sqlalchemy.url = postgresql+asyncpg://threadix:threadix_secret@localhost:5432/threadix_thread


[post_write_hooks]
# Add post-write hooks here if needed

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
